<!DOCTYPE html>
<html>
<head>
    <title>IPL Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <h2 onclick="showModal('ipl')" style="cursor:pointer;">IPL 2026</h2>
    <a href="#teams">Teams</a>
    <a href="#players">Players</a>
</nav>

<header>
    <h1>Indian Premier League</h1>
    <p>The Biggest T20 Cricket League</p>
    <img src="images/ipl.png" class="logo" onclick="showModal('ipl')" style="cursor:pointer;">
</header>

<section id="teams">
    <h2>Top Teams</h2>
    <div class="card-container">

        <div class="card" onclick="showModal('csk')">
            <img src="images/csk.png">
            <h3>Chennai Super Kings</h3>
        </div>

        <div class="card" onclick="showModal('mi')">
            <img src="images/mi.png">
            <h3>Mumbai Indians</h3>
        </div>

        <div class="card" onclick="showModal('rcb')">
            <img src="images/rcb.png">
            <h3>Royal Challengers Bangalore</h3>
        </div>

    </div>
</section>

<section id="players">
    <h2>Star Players</h2>
    <div class="card-container">

        <div class="card" onclick="showModal('dhoni')">
            <img src="images/dhoni.jpg">
            <h3>MS Dhoni</h3>
        </div>

        <div class="card" onclick="showModal('kohli')">
            <img src="images/kohli.jpg">
            <h3>Virat Kohli</h3>
        </div>

        <div class="card" onclick="showModal('rohit')">
            <img src="images/rohit.jpg">
            <h3>Rohit Sharma</h3>
        </div>

    </div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modal-title"></h2>
        <p id="modal-text"></p>
    </div>
</div>

<footer>
    <p>© 2026 IPL Project</p>
</footer>

<script src="script.js"></script>

</body>
</html>
